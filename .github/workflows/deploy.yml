name: Deploy Backend

on:
  push:
    branches: [main]
    paths-ignore:
      - 'terraform/**'
      - 'docs/**'
      - '*.md'

env:
  AWS_REGION: ap-northeast-2
  ECS_CLUSTER: shgtrip-cluster

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/shgtrip-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # 앱 + 배치는 동일한 Spring Boot 이미지 (한 번 빌드, 두 ECR에 push)
      - name: Build and push Docker images
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          APP_REPO: shgtrip/app
          BATCH_REPO: shgtrip-batch
        run: |
          docker build -t app-image:$IMAGE_TAG .

          # 앱 ECR — SHA + latest 듀얼 태깅
          docker tag app-image:$IMAGE_TAG $ECR_REGISTRY/$APP_REPO:$IMAGE_TAG
          docker tag app-image:$IMAGE_TAG $ECR_REGISTRY/$APP_REPO:latest
          docker push $ECR_REGISTRY/$APP_REPO:$IMAGE_TAG
          docker push $ECR_REGISTRY/$APP_REPO:latest

          # 배치 ECR — latest만 (Step Functions가 latest pull)
          docker tag app-image:$IMAGE_TAG $ECR_REGISTRY/$BATCH_REPO:latest
          docker push $ECR_REGISTRY/$BATCH_REPO:latest

          echo "image=$ECR_REGISTRY/$APP_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # ECS 앱 서비스 롤링 배포
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition shgtrip-app \
            --query taskDefinition \
            > task-def.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: app
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS Service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: shgtrip-app
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false
          waiter:
            max-attempts: 120
            delay: 15
