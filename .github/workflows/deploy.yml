name: Deploy Backend

on:
  push:
    branches: [main]
    paths-ignore:
      - 'terraform/**'
      - 'docs/**'
      - '*.md'

env:
  AWS_REGION: ap-northeast-2

# OIDC 토큰 요청에 필요한 최소 권한
permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # CI에서 이미 테스트 통과한 코드만 여기 도달하므로 -x test
      - name: Build JAR
        run: ./gradlew bootJar --no-daemon -x test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/shgtrip-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # latest + SHA 듀얼 태깅: latest는 편의용, SHA는 롤백 추적용
      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/shgtrip-batch:$IMAGE_TAG \
                       -t $ECR_REGISTRY/shgtrip-batch:latest .
          docker push $ECR_REGISTRY/shgtrip-batch:$IMAGE_TAG
          docker push $ECR_REGISTRY/shgtrip-batch:latest
          echo "image=$ECR_REGISTRY/shgtrip-batch:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 현재 task definition을 가져와서 이미지만 교체 (다른 설정 유지)
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition shgtrip-batch \
            --query taskDefinition \
            > task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: batch
          image: ${{ steps.build.outputs.image }}

      - name: Register new task definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://${{ steps.task-def.outputs.task-definition }}
