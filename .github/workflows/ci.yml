name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: 단위 테스트
  unit-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Run unit tests
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Generate coverage report
        run: ./gradlew jacocoTestReport --no-daemon

      - name: Verify coverage threshold (70%)
        run: ./gradlew jacocoTestCoverageVerification --no-daemon

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/

  # Job 2: 통합 테스트 (DB/Redis service container)
  integration-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: shgtrip
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run integration tests
        run: ./gradlew integrationTest --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: testpassword123
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Build check
        run: ./gradlew build -x test --no-daemon

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: build/test-results/integrationTest/*.xml
          reporter: java-junit
          fail-on-error: true
