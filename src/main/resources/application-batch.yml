# =============================================================================
# Batch Profile Configuration
# 배치 전용 프로필 (SPRING_PROFILES_ACTIVE=batch)
# ECS Fargate Scheduled Task로 실행 — CommandLineRunner 기반, @Scheduled 미사용
# =============================================================================

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/trip
    username: ${DB_USERNAME:weShg}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  # 스케줄링 최소화 — 배치는 CommandLineRunner로 실행
  task:
    scheduling:
      pool:
        size: 1

# --- Cookie 설정 (배치에서는 미사용이지만 Bean 생성 필요) ---
cookie:
  secure: false

# --- JWT 설정 (배치에서는 미사용이지만 Bean 생성 필요) ---
jwt:
  secret: batch_dummy_secret_key_not_used_in_batch_mode
  access-expiration: 1800000
  refresh-expiration: 604800000

# --- OAuth 설정 (배치에서는 미사용) ---
oauth:
  kakao:
    client-id: dummy
    client-secret: dummy
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    redirect-uri: http://localhost:3000/callback/kakao
  google:
    client-id: dummy
    client-secret: dummy
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
    redirect-uri: http://localhost:3000/callback/google
  naver:
    client-id: dummy
    client-secret: dummy
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    redirect-uri: http://localhost:3000/callback/naver

# --- Anthropic API 설정 ---
anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  models:
    haiku: claude-haiku-4-5-20251001
    sonnet: claude-sonnet-4-6
    max-output-tokens: 64000
  batch:
    model: claude-sonnet-4-20250514
    max-tokens-per-request: 1024
    poll-interval-ms: 10000
    max-poll-duration-ms: 3600000

# --- OpenAI API 설정 (임베딩 생성) ---
openai:
  api-key: ${OPENAI_API_KEY:}
  embedding-model: text-embedding-3-small
  embedding-dimensions: 1536

# --- 배치 작업 설정 ---
batch:
  foursquare:
    data-file-path: ${FOURSQUARE_DATA_PATH:data/foursquare-places.csv}
    chunk-size: 1000
    source: ${BATCH_FOURSQUARE_SOURCE:s3}
    # 우선 처리 도시 목록은 FoursquareSeeder.PRIORITY_CITIES 참조
  embedding:
    batch-size: 100
  enrich:
    chunk-size: 1000
    # LLM 보강 실행 여부 (기본 false — 초기엔 임베딩만 수행)
    # 프로덕션에서 보강이 필요할 때 BATCH_ENRICH_ENABLED=true로 설정
    enabled: ${BATCH_ENRICH_ENABLED:false}

# --- AWS S3 설정 (배치에서 Foursquare CSV 읽기) ---
cloud:
  aws:
    s3:
      region: ${AWS_REGION:ap-northeast-2}
      bucket: ${BATCH_FOURSQUARE_S3_BUCKET:shgtrip-data}

# --- 로깅 설정 (배치 모드) ---
logging:
  file:
    name: logs/shg-trip-batch.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 7
  level:
    "[com.shg.trip]": INFO
    "[com.shg.trip.shgtrip.domain.place.batch]": DEBUG
    "[org.springframework.boot]": INFO
