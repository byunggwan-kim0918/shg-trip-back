spring:
  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.core.AwsAutoConfiguration
      - io.awspring.cloud.autoconfigure.core.CredentialsProviderAutoConfiguration
      - io.awspring.cloud.autoconfigure.core.RegionProviderAutoConfiguration
      - io.awspring.cloud.autoconfigure.config.secretsmanager.SecretsManagerAutoConfiguration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/shgtrip
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:testpassword123}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}


jwt:
  secret: 0101010101010101010101010101010101010101010101010101010101010101
  access-expiration: 1800000
  refresh-expiration: 604800000

cookie:
  secure: false

oauth:
  kakao:
    client-id: test
    client-secret: test
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    redirect-uri: http://localhost:3000/callback/kakao
  google:
    client-id: test
    client-secret: test
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
    redirect-uri: http://localhost:3000/callback/google
  naver:
    client-id: test
    client-secret: test
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    redirect-uri: http://localhost:3000/callback/naver

anthropic:
  models:
    haiku: claude-haiku-4-5-20251001
    sonnet: claude-sonnet-4-6
    max-output-tokens: 64000

openai:
  api-key: test-openai-key
  embedding-model: text-embedding-3-small
  embedding-dimensions: 1536

google:
  places:
    api-key: test
    text-search-uri: https://places.googleapis.com/v1/places:searchText

planning:
  validation:
    soft-threshold: 70

cloud:
  aws:
    s3:
      region: ap-northeast-2
      bucket: shgtrip-data-test
      access-key: test
      secret-key: test