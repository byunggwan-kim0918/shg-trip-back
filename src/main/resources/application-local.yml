spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/trip
    username: weShg
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379

cookie:
  secure: false

cors:
  allowed-origins:
    - http://localhost:3000

logging:
  file:
    name: logs/shg-trip.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
  level:
    "[com.shg.trip]": DEBUG
    "[org.springframework.security]": DEBUG

jwt:
  secret: ${JWT_SECRET:bG9jYWxfZGV2X3NlY3JldF9rZXlfZm9yX2p3dF90ZXN0aW5n}
  access-expiration: 1800000
  refresh-expiration: 604800000

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    redirect-uri: http://localhost:3000/callback/kakao
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
    redirect-uri: http://localhost:3000/callback/google
  naver:
    client-id: ${NAVER_CLIENT_ID:}
    client-secret: ${NAVER_CLIENT_SECRET:}
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    redirect-uri: http://localhost:3000/callback/naver

planning:
  validation:
    # Soft 검증 통과 기준 점수 (0~100). Req 4.2 기반.
    # - 기본 점수 80점에서 estimatedCost 미입력(-10), tags 미입력(-5), stepOrder 불일치(-5), notes 채움률 50% 미만(-5) 감점
    # - 예산 초과(-15), 일정 밀도 이탈(-10), 교통 정보 누락(단계당 -5) 추가 감점
    # - 70점은 위 감점 조합 시 "구조는 온전하나 품질 미흡" 경계값으로 설정
    soft-threshold: 70

anthropic:
  models:
    haiku: claude-haiku-4-5-20251001
    sonnet: claude-sonnet-4-6
    max-output-tokens: 64000

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY:}
    text-search-uri: https://places.googleapis.com/v1/places:searchText

cloud:
  aws:
    s3:
      region: ap-northeast-2
      bucket: shgtrip-data
      access-key: ${AWS_ACCESS_KEY_ID:}
      secret-key: ${AWS_SECRET_ACCESS_KEY:}

batch:
  foursquare:
    source: local