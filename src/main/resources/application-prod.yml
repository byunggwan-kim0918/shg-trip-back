spring:
  config:
    import: aws-secretsmanager:shg-trip/prod
  cloud:
    aws:
      region:
        static: ap-northeast-2
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/trip
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

cookie:
  secure: true

cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGIN:https://shg-trip.cloud}

logging:
  file:
    name: logs/shg-trip.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
  level:
    "[com.shg.trip]": INFO
    "[org.springframework.security]": WARN

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 1800000
  refresh-expiration: 604800000

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    redirect-uri: ${OAUTH_KAKAO_REDIRECT_URI:https://shg-trip.cloud/callback/kakao}
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v2/userinfo
    redirect-uri: ${OAUTH_GOOGLE_REDIRECT_URI:https://shg-trip.cloud/callback/google}
  naver:
    client-id: ${NAVER_CLIENT_ID}
    client-secret: ${NAVER_CLIENT_SECRET}
    token-uri: https://nid.naver.com/oauth2.0/token
    user-info-uri: https://openapi.naver.com/v1/nid/me
    redirect-uri: ${OAUTH_NAVER_REDIRECT_URI:https://shg-trip.cloud/callback/naver}

planning:
  validation:
    soft-threshold: 70

anthropic:
  models:
    haiku: claude-haiku-4-5-20251001
    sonnet: claude-sonnet-4-6
    max-output-tokens: 64000

openai:
  api-key: ${OPENAI_API_KEY}
  embedding-model: text-embedding-3-small
  embedding-dimensions: 1536

google:
  places:
    api-key: ${GOOGLE_PLACES_API_KEY}
    text-search-uri: https://places.googleapis.com/v1/places:searchText
