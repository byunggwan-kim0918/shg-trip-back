services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: shg-trip-postgres
    environment:
      POSTGRES_DB: trip
      POSTGRES_USER: weShg
      POSTGRES_PASSWORD: "shg99**"
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - shg_trip_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weShg -d trip"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: shg-trip-redis
    ports:
      - "6379:6379"
    volumes:
      - shg_trip_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  shg_trip_pgdata:
  shg_trip_redis:
